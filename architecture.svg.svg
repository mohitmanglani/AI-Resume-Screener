<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- Subtle drop shadow for cards -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.18"/>
    </filter>
    <!-- Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="560" fill="#0b1220"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="600">AI Resume Screener — Architecture</text>
  <text x="600" y="62" text-anchor="middle" fill="#64748b" font-size="13">n8n · Groq · Google Drive · Google Sheets · Gmail</text>

  <!-- Stage 1: Trigger & Extract -->
  <g transform="translate(40, 110)">
    <rect width="200" height="380" rx="14" fill="#0f1830" stroke="#1e293b" stroke-width="1"/>
    <text x="100" y="28" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">INGEST</text>

    <!-- Drive Trigger -->
    <g transform="translate(20, 50)" filter="url(#shadow)">
      <rect width="160" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
      <circle cx="22" cy="30" r="10" fill="#fbbf24"/>
      <text x="22" y="34" text-anchor="middle" fill="#0b1220" font-size="11" font-weight="700">▶</text>
      <text x="42" y="28" fill="#e2e8f0" font-size="13" font-weight="600">Drive Trigger</text>
      <text x="42" y="46" fill="#64748b" font-size="11">on file created</text>
    </g>

    <!-- Download -->
    <g transform="translate(20, 140)" filter="url(#shadow)">
      <rect width="160" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
      <circle cx="22" cy="30" r="10" fill="#3b82f6"/>
      <text x="22" y="34" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">↓</text>
      <text x="42" y="28" fill="#e2e8f0" font-size="13" font-weight="600">Download File</text>
      <text x="42" y="46" fill="#64748b" font-size="11">Google Drive</text>
    </g>

    <!-- Extract -->
    <g transform="translate(20, 230)" filter="url(#shadow)">
      <rect width="160" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
      <circle cx="22" cy="30" r="10" fill="#8b5cf6"/>
      <text x="22" y="34" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">PDF</text>
      <text x="42" y="28" fill="#e2e8f0" font-size="13" font-weight="600">Extract Text</text>
      <text x="42" y="46" fill="#64748b" font-size="11">resume → string</text>
    </g>

    <!-- Vertical arrows -->
    <line x1="100" y1="111" x2="100" y2="139" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="100" y1="201" x2="100" y2="229" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Stage 2: Parse Candidate -->
  <g transform="translate(280, 110)">
    <rect width="220" height="380" rx="14" fill="#0f1830" stroke="#1e293b" stroke-width="1"/>
    <text x="110" y="28" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">PARSE CANDIDATE</text>

    <!-- LLM call 1 -->
    <g transform="translate(20, 50)" filter="url(#shadow)">
      <rect width="180" height="84" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
      <circle cx="22" cy="42" r="11" fill="#f97316"/>
      <text x="22" y="46" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">G</text>
      <text x="42" y="32" fill="#e2e8f0" font-size="13" font-weight="600">Resume Analyser</text>
      <text x="42" y="50" fill="#fbbf24" font-size="11">Groq · gpt-oss-20b</text>
      <text x="42" y="68" fill="#64748b" font-size="10.5">→ structured JSON</text>
    </g>

    <!-- Parser 1 -->
    <g transform="translate(20, 170)" filter="url(#shadow)">
      <rect width="180" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="22" y="36" fill="#22c55e" font-size="14" font-weight="700">{ }</text>
      <text x="55" y="28" fill="#e2e8f0" font-size="13" font-weight="600">JSON Parser</text>
      <text x="55" y="46" fill="#64748b" font-size="11">defensive · resilient</text>
    </g>

    <!-- Output preview -->
    <g transform="translate(20, 260)">
      <rect width="180" height="100" rx="8" fill="#0b1220" stroke="#1e293b" stroke-dasharray="3,3"/>
      <text x="14" y="22" fill="#64748b" font-size="10" font-family="ui-monospace, monospace">candidate_name</text>
      <text x="14" y="38" fill="#64748b" font-size="10" font-family="ui-monospace, monospace">years_of_experience</text>
      <text x="14" y="54" fill="#64748b" font-size="10" font-family="ui-monospace, monospace">skills[ ], tools[ ]</text>
      <text x="14" y="70" fill="#64748b" font-size="10" font-family="ui-monospace, monospace">strengths[ ]</text>
      <text x="14" y="86" fill="#64748b" font-size="10" font-family="ui-monospace, monospace">red_flags[ ]</text>
    </g>

    <!-- arrows -->
    <line x1="110" y1="135" x2="110" y2="169" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="110" y1="231" x2="110" y2="259" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Stage 3: Score -->
  <g transform="translate(540, 110)">
    <rect width="220" height="380" rx="14" fill="#0f1830" stroke="#1e293b" stroke-width="1"/>
    <text x="110" y="28" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">SCORE vs JD</text>

    <!-- JD source -->
    <g transform="translate(20, 50)" filter="url(#shadow)">
      <rect width="180" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
      <circle cx="22" cy="30" r="10" fill="#10b981"/>
      <text x="22" y="34" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">⊞</text>
      <text x="42" y="28" fill="#e2e8f0" font-size="13" font-weight="600">Get JD Row</text>
      <text x="42" y="46" fill="#64748b" font-size="11">Google Sheets · dynamic</text>
    </g>

    <!-- LLM call 2 -->
    <g transform="translate(20, 140)" filter="url(#shadow)">
      <rect width="180" height="84" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
      <circle cx="22" cy="42" r="11" fill="#f97316"/>
      <text x="22" y="46" text-anchor="middle" fill="#fff" font-size="11" font-weight="800">G</text>
      <text x="42" y="32" fill="#e2e8f0" font-size="13" font-weight="600">HR Scorer</text>
      <text x="42" y="50" fill="#fbbf24" font-size="11">Groq · gpt-oss-20b</text>
      <text x="42" y="68" fill="#64748b" font-size="10.5">candidate × JD → score</text>
    </g>

    <!-- Parser + Merge -->
    <g transform="translate(20, 260)" filter="url(#shadow)">
      <rect width="180" height="74" rx="10" fill="#1e293b" stroke="#334155"/>
      <text x="22" y="36" fill="#22c55e" font-size="14" font-weight="700">{ }</text>
      <text x="55" y="28" fill="#e2e8f0" font-size="13" font-weight="600">Parse + Merge</text>
      <text x="55" y="46" fill="#64748b" font-size="11">candidate ⊕ score</text>
      <text x="55" y="62" fill="#64748b" font-size="11">+ filename, timestamp</text>
    </g>

    <line x1="110" y1="111" x2="110" y2="139" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
    <line x1="110" y1="225" x2="110" y2="259" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>

  <!-- Stage 4: Decide & Act -->
  <g transform="translate(800, 110)">
    <rect width="360" height="380" rx="14" fill="#0f1830" stroke="#1e293b" stroke-width="1"/>
    <text x="180" y="28" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">DECIDE &amp; ACT</text>

    <!-- If gate -->
    <g transform="translate(140, 50)" filter="url(#shadow)">
      <polygon points="40,0 80,30 40,60 0,30" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="40" y="28" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">score</text>
      <text x="40" y="42" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">≥ 70 ?</text>
    </g>

    <!-- TRUE branch: shortlist -->
    <g transform="translate(20, 160)" filter="url(#shadow)">
      <rect width="160" height="60" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
      <circle cx="22" cy="30" r="10" fill="#22c55e"/>
      <text x="22" y="34" text-anchor="middle" fill="#0b1220" font-size="13" font-weight="800">✓</text>
      <text x="42" y="28" fill="#e2e8f0" font-size="13" font-weight="600">Shortlist Email</text>
      <text x="42" y="46" fill="#64748b" font-size="11">Gmail · personalised</text>
    </g>

    <g transform="translate(20, 240)" filter="url(#shadow)">
      <rect width="160" height="60" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
      <circle cx="22" cy="30" r="10" fill="#10b981"/>
      <text x="22" y="34" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">⊞</text>
      <text x="42" y="28" fill="#e2e8f0" font-size="13" font-weight="600">Append to Sheet</text>
      <text x="42" y="46" fill="#64748b" font-size="11">audit trail · 12 cols</text>
    </g>

    <!-- FALSE branch: reject -->
    <g transform="translate(200, 200)" filter="url(#shadow)">
      <rect width="140" height="60" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
      <circle cx="22" cy="30" r="10" fill="#ef4444"/>
      <text x="22" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="800">✕</text>
      <text x="42" y="28" fill="#e2e8f0" font-size="13" font-weight="600">Reject Email</text>
      <text x="42" y="46" fill="#64748b" font-size="11">Gmail · courteous</text>
    </g>

    <!-- Branch labels -->
    <text x="125" y="135" fill="#22c55e" font-size="11" font-weight="700">TRUE</text>
    <text x="245" y="135" fill="#ef4444" font-size="11" font-weight="700">FALSE</text>

    <!-- Branch arrows from If -->
    <path d="M 158 110 Q 100 130 100 159" stroke="#22c55e" stroke-width="1.8" fill="none" marker-end="url(#arrow-green)"/>
    <path d="M 220 110 Q 270 140 270 199" stroke="#ef4444" stroke-width="1.8" fill="none" marker-end="url(#arrow-red)"/>
    <!-- Shortlist email -> sheet append -->
    <line x1="100" y1="221" x2="100" y2="239" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  </g>

  <!-- Cross-stage flow arrows -->
  <line x1="240" y1="285" x2="280" y2="285" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="500" y1="285" x2="540" y2="285" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="760" y1="285" x2="800" y2="285" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Footer caption -->
  <text x="600" y="525" text-anchor="middle" fill="#64748b" font-size="11">14-node n8n workflow · two LLM calls · structured JSON throughout</text>
</svg>
